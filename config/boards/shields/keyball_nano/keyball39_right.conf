CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_EXT_POWER=y

CONFIG_PMW3610=y
# Slightly increased CPI for testing cursor speed
CONFIG_PMW3610_CPI=1800
CONFIG_PMW3610_CPI_DIVIDOR=2
CONFIG_PMW3610_ORIENTATION_180=y
CONFIG_PMW3610_SNIPE_CPI=800
CONFIG_PMW3610_SNIPE_CPI_DIVIDOR=3
CONFIG_PMW3610_SCROLL_TICK=32
CONFIG_PMW3610_INVERT_SCROLL_X=y
CONFIG_PMW3610_INVERT_SCROLL_Y=n
# Disable smart algorithm and power saving for maximum performance
CONFIG_PMW3610_SMART_ALGORITHM=y
CONFIG_PMW3610_FORCE_AWAKE=y

# Disable all downshift modes for continuous high-performance tracking
# CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3264
# CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=20
# CONFIG_PMW3610_REST1_DOWNSHIFT_TIME_MS=9600
# CONFIG_PMW3610_REST2_SAMPLE_TIME_MS=
# CONFIG_PMW3610_REST2_DOWNSHIFT_TIME_MS=
# CONFIG_PMW3610_REST3_SAMPLE_TIME_MS=
# CONFIG_PMW3610_REST3_DOWNSHIFT_TIME_MS=

# Use hardware IRQ-driven mode for lowest latency on slow movements
# (IRQ pin is wired in the overlay; sensor fires interrupt immediately on movement)
# CONFIG_PMW3610_POLLING_RATE_125_SW=y

# Minimum BLE connection interval for reduced latency (7.5ms)
# macOS accepts this cleanly; Windows may override to ~15ms but still improves from default
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# CONFIG_ZMK_STUDIO=y
# CONFIG_ZMK_STUDIO_LOCKING=n
# Disable automouse timeout for instant response
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=0
# Lower movement threshold for more sensitive tracking  
CONFIG_PMW3610_MOVEMENT_THRESHOLD=0
